# Curated relationship annotations. Each entry connects two people (ids from
# people.yaml) with free-text `notes` / `links` and the one remaining curated
# factor:
#   collaboration: 0-2   (non-paper collaboration: software, organizing, ...)
# Coauthorship is now computed from papers.yaml and advising from
# advising.yaml - do not enter those here. An entry in this file also
# guarantees the edge exists even with no tracked papers.
#
# Notes were curated from public knowledge of the community and verified
# against DBLP, the Mathematics Genealogy Project, theses, and homepages
# (July 2026). Corrections welcome - this file is the place to make them.

